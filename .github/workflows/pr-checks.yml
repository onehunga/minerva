name: PR Checks

on:
  pull_request:
    branches:
      - development
  workflow_dispatch:

jobs:
  frontend:
    name: frontend / lint test build
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test:unit:ci

      - name: Build
        run: bun run build

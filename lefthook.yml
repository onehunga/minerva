glob_matcher: doublestar
be_quiet: true

pre-commit:
  parallel: true
  jobs:
    - name: frontend/format-check
      root: frontend
      glob: "**/*.{ts,js,vue}"
      run: bun run format:check
    - name: frontend/lint
      root: frontend
      glob: "**/*.{ts,js,vue}"
      run: bun run lint:oxlint
    - name: frontend/typecheck
      root: frontend
      glob: "**/*.{ts,vue}"
      run: bun run type-check
    - name: backend/format-check
      root: backend
      glob: "**/*.java"
      run: ./gradlew spotlessCheck -q

pre-push:
  jobs:
    - name: frontend/unit-tests
      root: frontend
      glob: "**/*.spec.{ts,js,vue}"
      run: bun run test:unit:ci
    - name: backend/tests
      root: backend
      glob: "**/*.java"
      run: ./gradlew :test -q
